<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ética &amp; Compliance — JuegoPoke</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    #game-container {
      position: relative;
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<div id="game-container"></div>
<div id="error-msg" style="display:none;color:#ff4;font-family:monospace;font-size:14px;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;background:#111;padding:20px;border:2px solid #ff4;">
  Error al cargar el juego.<br>Extrae el ZIP a una carpeta y abre index.html desde allí.<br><small id="error-detail"></small>
</div>
<script>
window.onerror = function(msg, src, line) {
  document.getElementById('error-msg').style.display = 'block';
  document.getElementById('error-detail').textContent = msg + ' (' + (src||'').split('/').pop() + ':' + line + ')';
};
</script>


<!-- libs -->
<script src="lib/phaser.min.js"></script>

<!-- game modules (globals, order matters) -->
<script src="src/scorm.js"></script>
<script src="src/GameState.js"></script>
<script src="src/content.js"></script>
<script src="src/sprites.js"></script>
<script src="src/AssetData.js"></script>
<script src="src/scenes/BootScene.js"></script>
<script src="src/scenes/StartScene.js"></script>
<script src="src/scenes/IntroScene.js"></script>
<script src="src/scenes/MapScene.js"></script>
<script src="src/scenes/BattleScene.js"></script>
<script src="src/scenes/VictoryScene.js"></script>
<script src="src/main.js"></script>
</body>
</html>
